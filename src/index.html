<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图片工具</title>
  <script type="module" src="/main.js" defer></script>
</head>
<body>
  <!-- Shared inline-SVG icon defs (referenced via <use href="#i-..."/>) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="i-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"/></symbol>
      <symbol id="i-rect" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="6" width="16" height="12" rx="2"/></symbol>
      <symbol id="i-lasso" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9c0-2.5 3-4 7-4s7 1.5 7 4-3 4-7 4M5 9v4c0 2 2 3.5 4 3.5"/><circle cx="9" cy="17.5" r="1.5"/></symbol>
      <symbol id="i-undo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14l-5-5 5-5M4 9h11a5 5 0 0 1 5 5v6"/></symbol>
      <symbol id="i-redo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14l5-5-5-5M20 9H9a5 5 0 0 0-5 5v6"/></symbol>
      <symbol id="i-reset" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15.5-6.3M21 4v5h-5"/><path d="M21 12a9 9 0 0 1-15.5 6.3M3 20v-5h5"/></symbol>
      <symbol id="i-image" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="2"/><path d="m3 17 5-5 6 6"/><path d="m14 15 3-3 4 4"/></symbol>
      <symbol id="i-film" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="1.5"/><path d="M3 9h18M3 15h18M7 5v14M17 5v14"/></symbol>
      <symbol id="i-mosaic" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="6" height="6" rx="0.5"/><rect x="11" y="3" width="6" height="6" rx="0.5" opacity=".55"/><rect x="3" y="11" width="6" height="6" rx="0.5" opacity=".55"/><rect x="11" y="11" width="6" height="6" rx="0.5"/></symbol>
      <symbol id="i-camera" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6.5" width="18" height="12.5" rx="2"/><circle cx="12" cy="12.5" r="3.5"/><path d="M8 6.5 9.5 4.5h5L16 6.5"/></symbol>
      <symbol id="i-save" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h11l3 3v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1Z"/><path d="M8 4v5h7"/><rect x="7" y="13" width="10" height="7" rx="0.5"/></symbol>
      <symbol id="i-text" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6h14M12 6v13M8.5 19h7"/></symbol>
      <symbol id="i-blur" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.5"/><circle cx="12" cy="12" r="6" opacity=".55"/><circle cx="12" cy="12" r="9.5" opacity=".3"/></symbol>
      <symbol id="i-export" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 8l5-5 5 5"/><path d="M5 15v4a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4"/></symbol>
      <symbol id="i-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></symbol>
    </defs>
  </svg>

  <div class="app">
    <!-- Top toolbar shared by both tabs -->
    <div class="top-toolbar">
      <button id="btn-open" class="tt-btn tt-primary" title="打开 (Ctrl+O)">
        <svg class="i"><use href="#i-open"/></svg><span>打开</span>
      </button>
      <span class="top-filename" id="top-filename"><span class="dot"></span><span class="label">未加载文件</span></span>
      <span class="top-spacer"></span>
      <div class="seg" id="sel-mode-group">
        <button class="active" id="btn-sel-rect" title="矩形选区 (Tab)"><svg class="i"><use href="#i-rect"/></svg><span>矩形</span></button>
        <button id="btn-sel-lasso" title="套索选区 (Tab)"><svg class="i"><use href="#i-lasso"/></svg><span>套索</span></button>
      </div>
      <button id="btn-undo" class="tt-btn tt-icon" title="撤销 (Ctrl+Z)"><svg class="i"><use href="#i-undo"/></svg></button>
      <button id="btn-redo" class="tt-btn tt-icon" title="重做 (Ctrl+Shift+Z)"><svg class="i"><use href="#i-redo"/></svg></button>
      <button id="btn-reset" class="tt-btn tt-icon" title="重置所有效果"><svg class="i"><use href="#i-reset"/></svg></button>
    </div>

    <div class="tab-bar primary-tabs">
      <button class="tab-btn active" data-tab="image-tools"><svg class="i"><use href="#i-image"/></svg>图片工具</button>
      <button class="tab-btn" data-tab="conversion"><svg class="i"><use href="#i-film"/></svg>格式转换</button>
    </div>

    <!-- Image Tools Tab -->
    <div class="tab-content active" id="tab-image-tools">
      <div class="image-tools-layout">
        <div class="image-area">
          <div class="canvas-scroll" id="canvas-scroll">
            <div class="canvas-wrapper" id="canvas-wrapper">
              <canvas id="main-canvas"></canvas>
              <canvas id="text-canvas"></canvas>
              <canvas id="overlay-canvas"></canvas>
            </div>
          </div>
        </div>

        <div class="tools-panel">
          <div class="pill-bar" id="img-pill-bar">
            <button class="pill-btn active" data-tool="mosaic"><svg class="icon"><use href="#i-mosaic"/></svg>马赛克</button>
            <button class="pill-btn" data-tool="camera"><svg class="icon"><use href="#i-camera"/></svg>相机</button>
            <button class="pill-btn" data-tool="save"><svg class="icon"><use href="#i-save"/></svg>保存到</button>
            <button class="pill-btn" data-tool="text"><svg class="icon"><use href="#i-text"/></svg>文字</button>
            <button class="pill-btn" data-tool="blur"><svg class="icon"><use href="#i-blur"/></svg>模糊</button>
          </div>

          <div class="tool-content active" id="tool-mosaic">
            <div class="field"><label>马赛克大小: <span id="mosaic-size-val">20</span></label>
              <input type="range" id="mosaic-size" min="5" max="50" value="20" step="1" />
            </div>
            <div class="apply-row">
              <button id="btn-apply-mosaic" class="btn-apply">应用马赛克 (Ctrl+M)</button>
            </div>
          </div>

          <div class="tool-content" id="tool-text">
            <input type="text" id="text-input" placeholder="在此输入文字..." />
            <div class="form-row">
              <label>字体:</label>
              <select id="text-font">
                <option value="Arial">Arial</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Courier New">Courier New</option>
                <option value="Georgia">Georgia</option>
                <option value="Microsoft YaHei">微软雅黑</option>
                <option value="SimSun">宋体</option>
              </select>
            </div>
            <div class="form-row">
              <label>颜色:</label>
              <input type="color" id="text-color" value="#000000" />
            </div>
            <div class="form-row">
              <label>大小: <span id="text-size-val">20</span></label>
              <input type="range" id="text-size" min="8" max="200" value="20" step="1" />
            </div>
            <div class="form-row">
              <label>角度: <span id="text-angle-val">0</span>&deg;</label>
              <input type="range" id="text-angle" min="-90" max="90" value="0" step="1" />
            </div>
            <div class="form-row">
              <label><input type="checkbox" id="text-auto-fit" /> 自适应选区大小</label>
            </div>
            <div class="form-row">
              <label><input type="checkbox" id="text-vertical" /> 竖版排列</label>
            </div>
            <div class="preview-row">
              <canvas id="text-preview" width="60" height="60"></canvas>
            </div>
            <div class="apply-row">
              <button id="btn-apply-text" class="btn-apply">添加文字图层</button>
            </div>
            <div class="text-layer-section" id="text-layer-section">
              <label class="text-layer-header">文字图层</label>
              <div id="text-layer-list" class="text-layer-list"></div>
            </div>
          </div>

          <div class="tool-content" id="tool-blur">
            <div class="field"><label>模糊强度: <span id="blur-intensity-val">20</span></label>
              <input type="range" id="blur-intensity" min="5" max="50" value="20" step="1" />
            </div>
            <div class="form-row">
              <label>模糊角度: <span id="blur-angle-val">90</span>&deg;</label>
              <input type="range" id="blur-angle" min="0" max="180" value="90" step="1" />
            </div>
            <div class="preview-row">
              <canvas id="blur-preview" width="60" height="60"></canvas>
            </div>
            <div class="apply-row">
              <button id="btn-apply-blur" class="btn-apply">应用模糊 (Ctrl+B)</button>
            </div>
          </div>

          <div class="tool-content" id="tool-camera">
            <div class="form-row">
              <label>电量: <span id="camera-battery-val">100</span>%</label>
              <input type="range" id="camera-battery" min="0" max="100" value="100" step="1" />
            </div>
            <div class="form-row">
              <label>计时器:</label>
              <input type="text" id="camera-timer" value="" placeholder="HH:MM:SS.mmm" />
            </div>
            <div class="apply-row">
              <button id="btn-apply-camera" class="btn-apply">应用相机效果</button>
            </div>
          </div>

          <div class="tool-content" id="tool-save">
            <div class="field"><label>文件格式</label>
              <select id="save-format">
                <option value="png">PNG（无损）</option>
                <option value="jpg">JPEG</option>
              </select>
            </div>
            <div class="field" id="save-quality-field" style="display:none">
              <label>JPEG 质量: <span id="save-quality-val">90</span></label>
              <input type="range" id="save-quality" min="40" max="100" value="90" step="1" />
            </div>
            <div class="apply-row">
              <button id="btn-save" class="btn-apply"><svg class="i"><use href="#i-save"/></svg>保存到文件... (Ctrl+S)</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Conversion Tab -->
    <div class="tab-content" id="tab-conversion">
      <div class="conversion-layout">
        <div class="conv-preview-area">
          <div class="conv-preview-scroll empty" id="conv-preview-scroll">
            <div class="conv-canvas-wrapper" id="conv-canvas-wrapper">
              <canvas id="conv-canvas"></canvas>
              <canvas id="conv-overlay-canvas"></canvas>
            </div>
            <div class="conv-loading-overlay" id="conv-loading-overlay" style="display:none">
              <div class="conv-loading-inner">
                <div class="conv-loading-label">加载中...</div>
                <div class="conv-progress-bar">
                  <div class="conv-progress-fill" id="conv-loading-fill"></div>
                </div>
                <span id="conv-loading-text">0%</span>
              </div>
            </div>
          </div>
          <div class="conv-frame-controls">
            <button id="conv-btn-prev" title="上一帧">&lt;</button>
            <button id="conv-btn-play" title="播放 / 暂停 (Space)">▶</button>
            <button id="conv-btn-next" title="下一帧">&gt;</button>
            <label class="conv-loop-toggle" title="到末尾后是否从头播放"><input type="checkbox" id="conv-loop" checked /> 循环</label>
            <span id="conv-frame-info">未加载文件</span>
          </div>
          <div class="conv-thumb-strip" id="conv-thumb-strip"></div>
        </div>

        <div class="conv-controls-panel">
          <div class="pill-bar" id="conv-pill-bar">
            <button class="pill-btn active" data-conv-tool="mosaic"><svg class="icon"><use href="#i-mosaic"/></svg>马赛克</button>
            <button class="pill-btn" data-conv-tool="camera"><svg class="icon"><use href="#i-camera"/></svg>相机</button>
            <button class="pill-btn" data-conv-tool="output"><svg class="icon"><use href="#i-export"/></svg>输出</button>
          </div>

          <div class="conv-tool-content active" id="conv-tool-mosaic">
            <div class="field"><label>方块大小: <span id="conv-mosaic-size-val">20</span></label>
              <input type="range" id="conv-mosaic-size" min="5" max="50" value="20" step="1" />
            </div>
            <p class="hint-text">在预览图上拖动鼠标框选区域，然后点应用。</p>
            <div class="apply-row">
              <button id="conv-btn-mosaic-frame" class="btn-apply" disabled>应用本帧</button>
              <button id="conv-btn-mosaic-all" class="btn-apply secondary" disabled>应用全部</button>
            </div>
          </div>

          <div class="conv-tool-content" id="conv-tool-camera">
            <div class="field">
              <label>电量: <span id="conv-camera-battery-val">100</span>%</label>
              <input type="range" id="conv-camera-battery" min="0" max="100" value="100" step="1" />
            </div>
            <div class="field">
              <label>计时起始:</label>
              <input type="text" id="conv-camera-timer" value="00:00:00.000" placeholder="HH:MM:SS.mmm" />
            </div>
            <div class="form-row">
              <label><input type="checkbox" id="conv-camera-auto-inc" checked /> 导出时自动递增</label>
              <input type="number" id="conv-camera-auto-inc-ms" value="100" min="1" style="width:70px" />
              <label>ms/帧</label>
            </div>
            <div class="apply-row">
              <button id="conv-btn-camera-frame" class="btn-apply">应用本帧</button>
              <button id="conv-btn-camera-all" class="btn-apply secondary">应用全部</button>
            </div>
          </div>

          <div class="conv-tool-content" id="conv-tool-output">
            <div class="conv-section conv-file-info" id="conv-file-info" style="display:none">
              <label class="conv-section-title">文件信息</label>
              <div class="conv-info-grid" id="conv-info-grid"></div>
            </div>

            <div class="field"><label>输出格式</label>
              <select id="conv-format">
                <option value="gif">GIF</option>
                <option value="mp4">MP4</option>
                <option value="webp">WebP</option>
                <option value="apng">APNG</option>
                <option value="ugoira">Ugoira (pixiv 文件夹)</option>
              </select>
            </div>

            <div class="field" id="conv-preset-section">
              <label>预设</label>
              <select id="conv-preset">
                <option value="extreme">极致压缩 (推荐)</option>
                <option value="balanced">平衡画质</option>
                <option value="high">高质量</option>
                <option value="smallest">最小体积</option>
                <option value="original">原始质量</option>
                <option value="custom">自定义</option>
              </select>
            </div>

            <div class="form-row">
              <label>起始:</label>
              <input type="number" id="conv-start-frame" value="0" min="0" />
              <label>结束:</label>
              <input type="number" id="conv-end-frame" value="0" min="0" />
            </div>

            <div class="field">
              <label>帧率: <span id="conv-fps-val">15</span></label>
              <input type="range" id="conv-fps" min="1" max="60" value="15" step="1" />
            </div>

            <div class="conv-section conv-gif-options" id="conv-gif-options">
              <div class="field"><label>颜色数: <span id="conv-colors-val">128</span></label>
                <input type="range" id="conv-colors" min="2" max="256" value="128" step="1" />
              </div>
              <div class="field"><label>缩放</label>
                <select id="conv-scale">
                  <option value="100">100%</option>
                  <option value="75">75%</option>
                  <option value="50" selected>50%</option>
                  <option value="33">33%</option>
                  <option value="25">25%</option>
                </select>
              </div>
              <div class="field"><label>抖动</label>
                <select id="conv-dither">
                  <option value="sierra2_4a">sierra2_4a (高质量)</option>
                  <option value="bayer">bayer (均衡)</option>
                  <option value="none">无 (最小体积)</option>
                </select>
              </div>
              <div class="form-row">
                <label><input type="checkbox" id="conv-diff-palette" checked /> 差异调色板 (静态背景优化)</label>
              </div>
            </div>

            <div class="conv-section conv-ugoira-options" id="conv-ugoira-options" style="display:none">
              <div class="field"><label>JPEG 质量: <span id="conv-ugoira-quality-val">85</span></label>
                <input type="range" id="conv-ugoira-quality" min="40" max="100" value="85" step="1" />
              </div>
              <div class="form-row">
                <label>缩放:</label>
                <select id="conv-ugoira-scale">
                  <option value="100">100%</option>
                  <option value="75">75%</option>
                  <option value="50" selected>50%</option>
                  <option value="33">33%</option>
                  <option value="custom">自定义...</option>
                </select>
                <input type="number" id="conv-ugoira-scale-custom" min="1" max="100" value="50" style="width:60px; display:none" />
                <label id="conv-ugoira-scale-pct-label" style="display:none">%</label>
              </div>
              <div class="form-row">
                <label>帧延迟:</label>
                <select id="conv-ugoira-delay">
                  <option value="33">33 ms (~30 fps)</option>
                  <option value="50" selected>50 ms (20 fps)</option>
                  <option value="100">100 ms (10 fps)</option>
                  <option value="custom">自定义...</option>
                </select>
                <input type="number" id="conv-ugoira-delay-custom" min="1" max="10000" value="50" style="width:70px; display:none" />
                <label id="conv-ugoira-delay-ms-label" style="display:none">ms</label>
              </div>
              <div class="conv-ugoira-hint" style="font-size:12px; opacity:0.7; margin-top:6px">
                pixiv 限制：总帧数 &lt; 500，文件总体积 &lt; 16 MB。上传时把文件夹打 zip 拖到 pixiv。
              </div>
            </div>

            <div class="conv-section" id="conv-estimate-display" style="display:none">
              <div class="conv-estimate-text" id="conv-estimate-text"></div>
            </div>

            <div class="conv-section" id="conv-progress-section" style="display:none">
              <div class="conv-progress-bar">
                <div class="conv-progress-fill" id="conv-progress-fill"></div>
              </div>
              <span id="conv-progress-text">0%</span>
            </div>

            <div class="apply-row">
              <button id="conv-btn-estimate" class="btn-apply secondary" disabled>估算大小</button>
              <button id="conv-btn-export" class="btn-apply" disabled><svg class="i"><use href="#i-export"/></svg>导出</button>
            </div>

            <div class="conv-section">
              <div class="conv-status" id="conv-status"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp,image/bmp" style="display:none" />
  </div>
</body>
</html>
