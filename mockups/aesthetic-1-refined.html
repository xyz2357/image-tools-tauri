<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Aesthetic 1 · Refined</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Catppuccin Mocha base, but with warmed accents */
    --crust: #11111b;
    --base: #1e1e2e;
    --mantle: #181825;
    --surface0: #313244;
    --surface1: #45475a;
    --surface2: #585b70;
    --text: #cdd6f4;
    --subtext: #a6adc8;
    --dim: #6c7086;
    --accent: #f5c2a7;     /* warm peach */
    --accent-deep: #f2a679;
    --teal: #94e2d5;
    --green: #a6e3a1;
    --red: #f38ba8;
    --display: "Fraunces", "Times New Roman", Georgia, serif;
    --body: "Inter", "Segoe UI", system-ui, sans-serif;
    --mono: "JetBrains Mono", "Consolas", monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--base); color: var(--text); font-family: var(--body); font-size: 13px; overflow: hidden; }
  .app { display: flex; flex-direction: column; height: 100vh; }

  /* top toolbar */
  .top-toolbar {
    display: flex; align-items: center; gap: 4px; padding: 8px 14px;
    background: var(--mantle); border-bottom: 1px solid var(--surface0);
  }
  .tt-btn { display: inline-flex; align-items: center; gap: 7px; padding: 7px 12px; border-radius: 5px;
    background: transparent; color: var(--text); border: 1px solid transparent;
    font-family: var(--body); font-size: 12.5px; cursor: default; }
  .tt-btn:hover { background: var(--surface0); }
  .tt-btn svg { width: 14px; height: 14px; stroke-width: 1.6; }
  .tt-btn.open { background: var(--surface0); border-color: var(--surface1); }
  .filename { font-family: var(--display); font-style: italic; font-weight: 400; font-size: 14.5px;
    color: var(--text); padding: 0 14px; letter-spacing: 0.005em; }
  .filename .dim { color: var(--dim); margin-right: 8px; font-style: normal; font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; }
  .spacer { flex: 1; }
  .seg { display: inline-flex; padding: 2px; background: var(--surface0); border-radius: 6px; gap: 1px; }
  .seg .sb { padding: 5px 11px; font-size: 12px; border-radius: 4px; color: var(--subtext); display: inline-flex; align-items: center; gap: 5px; cursor: default; }
  .seg .sb svg { width: 12px; height: 12px; stroke-width: 1.7; }
  .seg .sb.active { background: var(--base); color: var(--accent); }
  .divider { width: 1px; height: 18px; background: var(--surface0); margin: 0 8px; }

  /* tab bar */
  .tab-bar { display: flex; background: var(--mantle); border-bottom: 1px solid var(--surface0); padding: 0 14px; }
  .tab-btn { padding: 12px 22px; background: none; border: 0; color: var(--dim); cursor: default;
    font-family: var(--display); font-style: italic; font-size: 15px; letter-spacing: 0.005em;
    border-bottom: 2px solid transparent; display: inline-flex; align-items: center; gap: 9px; }
  .tab-btn svg { width: 14px; height: 14px; stroke-width: 1.5; }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-btn .num { font-family: var(--mono); font-style: normal; font-size: 9px; color: var(--dim); letter-spacing: 0.18em; margin-right: 2px; }
  .tab-btn.active .num { color: var(--accent-deep); }

  /* layout */
  .layout { flex: 1; display: grid; grid-template-columns: 1fr 340px; min-height: 0; }
  .image-area { background:
    radial-gradient(ellipse at center, #1c1c2a 0%, #11111b 100%);
    display: grid; place-items: center; padding: 32px; min-height: 0; overflow: hidden; }
  .canvas { position: relative; box-shadow: 0 28px 70px rgba(0,0,0,.5), 0 0 0 1px var(--surface0); max-width: 100%; max-height: 100%; }
  .canvas img { display: block; max-width: 100%; max-height: calc(100vh - 49px - 45px - 64px); }
  .canvas .sel { position: absolute; inset: 16% 24% 28% 18%; border: 1px dashed var(--accent); background: rgba(245,194,167,0.05); }
  .canvas .sel::before, .canvas .sel::after { content:""; position:absolute; width:6px; height:6px; background:var(--accent); }
  .canvas .sel::before { left:-3px; top:-3px; } .canvas .sel::after { right:-3px; bottom:-3px; }

  /* right tools panel */
  .tools-panel { background: var(--mantle); border-left: 1px solid var(--surface0); display: flex; flex-direction: column; min-height: 0; }
  .pill-bar { display: flex; gap: 4px; padding: 14px 14px 10px; border-bottom: 1px solid var(--surface0); flex-wrap: wrap; }
  .pill-btn { background: transparent; color: var(--subtext); border: 1px solid var(--surface0); border-radius: 999px;
    padding: 6px 12px; font-size: 11.5px; font-family: var(--body); display: inline-flex; align-items: center; gap: 6px; cursor: default; }
  .pill-btn svg { width: 12px; height: 12px; stroke-width: 1.6; }
  .pill-btn:hover { color: var(--text); border-color: var(--surface1); }
  .pill-btn.active { background: var(--accent); color: var(--crust); border-color: var(--accent); font-weight: 600; }

  .tool-content { padding: 20px 18px; overflow: auto; flex: 1; }
  .tool-title { font-family: var(--display); font-weight: 500; font-size: 22px; letter-spacing: -0.015em; margin: 0 0 4px; line-height: 1.1; }
  .tool-title i { font-style: italic; color: var(--accent); }
  .tool-sub { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim); margin: 0 0 24px; }

  .field { margin-bottom: 18px; }
  .field-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .field-row label { font-size: 12px; color: var(--subtext); }
  .field-row .val { font-family: var(--mono); font-size: 12px; color: var(--text); }
  .field-row .val .u { color: var(--dim); margin-left: 3px; }
  .slider { height: 18px; position: relative; }
  .slider .track { position: absolute; left: 0; right: 0; top: 8px; height: 2px; background: var(--surface0); border-radius: 1px; }
  .slider .fill { position: absolute; top: 8px; height: 2px; background: var(--accent); border-radius: 1px; }
  .slider .knob { position: absolute; top: 3px; width: 12px; height: 12px; background: var(--text); border-radius: 50%; transform: translateX(-50%);
    box-shadow: 0 0 0 3px var(--mantle), 0 2px 4px rgba(0,0,0,.4); }
  .apply-row { display: flex; gap: 8px; margin-top: 20px; }
  .btn-apply { flex: 1; padding: 10px 14px; background: var(--accent); color: var(--crust); border: 0; border-radius: 5px;
    font-family: var(--body); font-size: 12.5px; font-weight: 600; letter-spacing: 0.01em; cursor: default;
    display: inline-flex; align-items: center; justify-content: center; gap: 7px; }
  .btn-apply.secondary { background: transparent; color: var(--text); border: 1px solid var(--surface1); flex: 0 0 auto; padding: 10px 14px; }
  .btn-apply svg { width: 13px; height: 13px; }
  .kbd { font-family: var(--mono); font-size: 10px; color: var(--accent-deep); margin-left: 8px; opacity: .9; }

  .hint { font-family: var(--display); font-style: italic; font-size: 13px; color: var(--subtext); line-height: 1.55; margin: 18px 0 0;
    padding: 12px 14px; border-left: 2px solid var(--accent); background: rgba(245,194,167,0.04); border-radius: 0 4px 4px 0; }
</style>
</head>
<body>
<div class="app">
  <div class="top-toolbar">
    <button class="tt-btn open">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
      打开
    </button>
    <span class="filename"><span class="dim">FILE</span>sample.png</span>

    <span class="spacer"></span>

    <div class="seg">
      <span class="sb active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="4" y="6" width="16" height="12" rx="1"/></svg>矩形</span>
      <span class="sb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 9c0-2.5 3-4 7-4s7 1.5 7 4-3 4-7 4c-2 0-3.8-.5-5-1.3M5 9v4c0 2 2 3.5 4 3.5"/></svg>套索</span>
    </div>
    <div class="divider"></div>
    <button class="tt-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 14l-5-5 5-5M4 9h11a5 5 0 015 5v6"/></svg>
      撤销
    </button>
    <button class="tt-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 14l5-5-5-5M20 9H9a5 5 0 00-5 5v6"/></svg>
      重做
    </button>
    <button class="tt-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12a9 9 0 0115.5-6.3M21 4v5h-5"/><path d="M21 12a9 9 0 01-15.5 6.3M3 20v-5h5"/></svg>
      重置
    </button>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active">
      <span class="num">01</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="6" width="18" height="13" rx="2"/><circle cx="12" cy="12.5" r="3.5"/><path d="M8 6l1.5-2h5L16 6"/></svg>
      图片工具
    </button>
    <button class="tab-btn">
      <span class="num">02</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="6" width="18" height="13" rx="1"/><path d="M3 10h18M7 6V4M17 6V4M7 19v1M17 19v1"/></svg>
      格式转换
    </button>
  </div>

  <div class="layout">
    <div class="image-area">
      <div class="canvas">
        <img src="../docs/samples/img-original.jpg" alt="" />
        <div class="sel"></div>
      </div>
    </div>

    <aside class="tools-panel">
      <div class="pill-bar">
        <button class="pill-btn active"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="6" height="6"/><rect x="11" y="3" width="6" height="6" opacity=".5"/><rect x="3" y="11" width="6" height="6" opacity=".5"/><rect x="11" y="11" width="6" height="6"/></svg>马赛克</button>
        <button class="pill-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="6" width="18" height="13" rx="2"/><circle cx="12" cy="12.5" r="3.5"/></svg>相机</button>
        <button class="pill-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 4h11l3 3v13H5z"/></svg>保存到</button>
        <button class="pill-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 6h14M12 6v13"/></svg>文字</button>
        <button class="pill-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="6" opacity=".5"/></svg>模糊</button>
      </div>

      <div class="tool-content">
        <h2 class="tool-title">Mosaic <i>—</i> block</h2>
        <p class="tool-sub">PIXELATE · SELECTION</p>

        <div class="field">
          <div class="field-row"><label>块大小</label><span class="val">20<span class="u">px</span></span></div>
          <div class="slider"><div class="track"></div><div class="fill" style="width:33%"></div><div class="knob" style="left:33%"></div></div>
        </div>

        <div class="apply-row">
          <button class="btn-apply">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12l4 4L19 6"/></svg>
            应用马赛克
            <span class="kbd">⌘M</span>
          </button>
        </div>

        <p class="hint">在画布上拖动鼠标框选区域，参数即时预览，按下应用后写入历史。</p>
      </div>
    </aside>
  </div>
</div>
</body>
</html>
